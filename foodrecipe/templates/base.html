{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Food Recipe Manager{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'foodrecipe/style.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{% url 'recipe_list' %}">FoodRecipe</a>
      <nav class="top-nav">
        <a href="{% url 'recipe_list' %}">All Recipes</a>
        <a class="button secondary" href="{% url 'create_recipe' %}">Add New</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>Recipe manager built with Django.</p>
      <p>Keep your favorite dishes organized and easy to update.</p>
    </div>
  </footer>
</body>
</html>
